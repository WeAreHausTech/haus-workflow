name: Quality

on:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: yarn install --immutable --check-cache

      - name: Audit dependencies
        continue-on-error: true
        run: yarn npm audit -A -R --severity high --environment production
      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Typecheck scripts
        run: yarn typecheck:scripts

      - name: Catalog audit
        run: yarn catalog:audit

      - name: Sources audit
        run: yarn sources:audit

      - name: Sources decisions
        run: yarn sources:decisions

      - name: Library audit
        run: yarn library:audit

      - name: Curated audit
        run: yarn curated:audit

      - name: Cleanup tracker status
        # Non-blocking by design: the script always exits 0 until P10 flips it.
        # Don't mask real crashes (tsx resolution, script errors) here.
        run: yarn cleanup:status
