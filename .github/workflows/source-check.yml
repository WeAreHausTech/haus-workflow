name: AI Source Check

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - "library/catalog/**"
      - "library/curation/**"

permissions:
  contents: read

jobs:
  check-sources:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
      - run: corepack enable
      - run: yarn install --immutable --check-cache
      - name: Audit dependencies
        continue-on-error: true
        run: yarn npm audit -A -R --severity high --environment production
      - run: yarn build
      - run: node dist/cli.js sources sync --check
      - run: node dist/cli.js sources audit
      - run: node dist/cli.js catalog-audit
