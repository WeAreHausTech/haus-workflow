name: AI Source Check

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - "library/catalog/sources.yaml"
      - "library/curation/**"

jobs:
  check-sources:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn build
      - run: node dist/cli.js sources sync --check
      - run: node dist/cli.js sources audit
      - run: node dist/cli.js catalog-audit
