# Release workflow — triggered when a v*.*.* tag is pushed.
#
# GitHub releases and CHANGELOG.md are created by release-it running locally
# (yarn release / scripts/release.sh). This workflow's sole responsibility is
# npm publish with provenance.
#
# Auth: OIDC Trusted Publishing — no NPM_TOKEN secret required.
# One-time setup: configure this repo as a trusted publisher on
# npmjs.com → @haus-tech/haus-workflow → Settings → Publishing.
# The id-token: write permission below grants the workflow an OIDC token
# that npm accepts in place of a stored secret.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write # needed for npm OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm (OIDC trusted publishing requires npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: yarn install --immutable --check-cache

      - name: Verify
        run: yarn verify

      - name: Pack dry-run
        run: npm pack --dry-run

      - name: Validate tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -e "process.stdout.write(require('./package.json').version)")"
          if [[ "$TAG_VERSION" != "$PKG_VERSION" ]]; then
            echo "Error: tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public --provenance
