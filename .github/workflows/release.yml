# Release validation workflow — triggered when a v*.*.* tag is pushed.
#
# npm publish is performed locally by the developer via `yarn release`
# (release-it), which handles: conventional-commit CHANGELOG generation,
# version bump, git commit + annotated tag, push, GitHub release creation,
# and `npm publish` using the developer's local npm credentials.
#
# This workflow's sole responsibility is post-tag CI validation:
# verify the build is clean and the tag version matches package.json.

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: yarn install --immutable --check-cache

      - name: Verify
        run: yarn verify

      - name: Pack dry-run
        run: npm pack --dry-run

      - name: Validate tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -e "process.stdout.write(require('./package.json').version)")"
          if [[ "$TAG_VERSION" != "$PKG_VERSION" ]]; then
            echo "Error: tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
