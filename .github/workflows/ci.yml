name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: yarn install --immutable --check-cache

      - name: Audit dependencies
        continue-on-error: true
        run: yarn npm audit -A -R --severity high --environment production
      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Typecheck scripts
        run: yarn typecheck:scripts

      - name: Build
        run: yarn build

      - name: Catalog audit
        run: node dist/cli.js catalog-audit

      - name: Test
        run: yarn test

      # Coverage gate (Phase 5: now BLOCKING — ratchet passes at the baseline
      # floor of 54, so a regression below floor fails the build).
      - name: Coverage
        run: yarn test:coverage

      - name: Coverage ratchet
        run: node scripts/coverage-ratchet.mjs

      - name: CLI smoke checks
        run: |
          TMP_DIR="$(mktemp -d)"
          cat > "$TMP_DIR/package.json" <<'EOF'
          {
            "name": "haus-smoke",
            "packageManager": "yarn@4.5.3",
            "dependencies": {
              "react": "19.0.0"
            }
          }
          EOF
          touch "$TMP_DIR/yarn.lock"
          (
            cd "$TMP_DIR"
            node "$GITHUB_WORKSPACE/dist/cli.js" scan --json
            node "$GITHUB_WORKSPACE/dist/cli.js" recommend --json
            # No catalog cache is populated in CI (the npm package ships only the
            # manifest, not skill bodies), so apply core files only. Installing
            # recommended catalog skills requires `haus update` to fetch content
            # from the live catalog, which we deliberately keep out of the smoke.
            node "$GITHUB_WORKSPACE/dist/cli.js" apply --write --allow-empty-cache
            node "$GITHUB_WORKSPACE/dist/cli.js" doctor
            node "$GITHUB_WORKSPACE/dist/cli.js" doctor --hooks
            # update --check can return non-zero when no lock entries were selected.
            node "$GITHUB_WORKSPACE/dist/cli.js" update --check || true
          )

  # Packed-tarball smoke: install the published artifact into a clean consumer and
  # run the shipped bin. Catches a missing `files` entry, broken bin shebang, ESM
  # resolution failure, or unbundled dependency that the in-repo `dist/cli.js` smoke
  # cannot see. Packs with `npm pack` to match the `npm publish` release path.
  pack-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: yarn install --immutable --check-cache

      # No explicit build step: pack-smoke runs `npm pack`, whose `prepack` hook
      # runs `yarn build`. A separate build step would compile twice.
      - name: Pack-and-install smoke
        env:
          HAUS_NO_POSTINSTALL: '1'
        run: node scripts/pack-smoke.mjs

  # Regression-test gate: a `fix:` commit must ship a test. A bug fixed without a
  # test will silently regress; this forces the regression test into the same PR.
  fix-needs-test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Require a test for fix commits
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          # checkout uses fetch-depth: 0, so fetch the base ref unshallowed —
          # a depth cap could truncate history before the merge-base on long
          # branches and make the range incomplete.
          git fetch --no-tags origin "$BASE_REF"
          RANGE="origin/$BASE_REF..HEAD"

          # Any commit whose subject starts with `fix:` or `fix(`...
          FIX_COMMITS="$(git log --format=%s "$RANGE" | grep -E '^fix(\(|:)' || true)"
          if [ -z "$FIX_COMMITS" ]; then
            echo "No fix: commits in $RANGE — gate not applicable."
            exit 0
          fi
          echo "Found fix commits:"
          echo "$FIX_COMMITS"

          # Escape hatch: explicit opt-out in the PR body.
          if printf '%s' "$PR_BODY" | grep -qF '[skip-regression-test]'; then
            echo "::notice::[skip-regression-test] present in PR body — skipping the fix-needs-test gate. A regression test should still follow."
            exit 0
          fi

          # The PR diff must touch at least one path under tests/.
          if git diff --name-only "$RANGE" | grep -qE '^tests/'; then
            echo "A fix commit is present and the PR touches tests/ — gate satisfied."
            exit 0
          fi

          echo "::error::This PR contains a fix: commit but changes no file under tests/. Add a regression test, or put [skip-regression-test] in the PR body with justification."
          exit 1
