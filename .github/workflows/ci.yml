name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Catalog audit
        run: yarn catalog:audit

      - name: Test
        run: yarn test

      - name: CLI smoke checks
        run: |
          node dist/cli.js scan --json
          node dist/cli.js recommend --json
          node dist/cli.js apply --dry-run
          node dist/cli.js update --check
          node dist/cli.js sources audit

      - name: Pack
        run: yarn pack
