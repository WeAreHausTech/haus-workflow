name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: yarn install --immutable

      - name: Audit dependencies
        run: yarn npm audit --severity high --recursive
      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Typecheck scripts
        run: yarn typecheck:scripts

      - name: Build
        run: yarn build

      - name: Catalog audit
        run: yarn catalog:audit

      - name: Sources audit
        run: yarn sources:audit

      - name: Sources decisions
        run: yarn sources:decisions

      - name: Library audit
        run: yarn library:audit

      - name: Curated audit
        run: yarn curated:audit

      - name: Test
        run: yarn test

      - name: CLI smoke checks
        run: |
          TMP_DIR="$(mktemp -d)"
          cat > "$TMP_DIR/package.json" <<'EOF'
          {
            "name": "haus-smoke",
            "packageManager": "yarn@4.5.3",
            "dependencies": {
              "react": "19.0.0"
            }
          }
          EOF
          touch "$TMP_DIR/yarn.lock"
          (
            cd "$TMP_DIR"
            node "$GITHUB_WORKSPACE/dist/cli.js" scan --json
            node "$GITHUB_WORKSPACE/dist/cli.js" recommend --json
            node "$GITHUB_WORKSPACE/dist/cli.js" apply --write
            node "$GITHUB_WORKSPACE/dist/cli.js" doctor
            node "$GITHUB_WORKSPACE/dist/cli.js" doctor --hooks
            # update --check can return non-zero when no lock entries were selected.
            node "$GITHUB_WORKSPACE/dist/cli.js" update --check || true
          )
          node dist/cli.js sources audit

      - name: Pack
        run: yarn pack
