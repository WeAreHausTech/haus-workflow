name: Sync catalog fixture

on:
  repository_dispatch:
    types: [sync-catalog-fixture] # fired by haus-workflow-catalog when manifest.json changes on main
  workflow_dispatch:

concurrency:
  group: sync-catalog-fixture
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Fetch latest catalog fixtures
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/WeAreHausTech/haus-workflow-catalog/main/manifest.json \
            -o library/catalog/manifest.json
          curl -fsSL \
            https://raw.githubusercontent.com/WeAreHausTech/haus-workflow-catalog/main/validation-rules.json \
            -o library/catalog/validation-rules.json

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet library/catalog/manifest.json library/catalog/validation-rules.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Open or update sync PR
        if: steps.diff.outputs.changed == 'true'
        env:
          DISPATCH_PAT: ${{ secrets.HAUS_WORKFLOW_DISPATCH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s\n' "$DISPATCH_PAT" | gh auth login --with-token
          gh auth setup-git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/sync-catalog-fixture"
          CATALOG_MANIFEST_URL="https://raw.githubusercontent.com/WeAreHausTech/haus-workflow-catalog/main/manifest.json"
          CATALOG_RULES_URL="https://raw.githubusercontent.com/WeAreHausTech/haus-workflow-catalog/main/validation-rules.json"
          git fetch origin main
          git fetch origin "$BRANCH" || true
          LEASE_REF=""
          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            LEASE_REF="$(git rev-parse "origin/$BRANCH")"
          fi
          git checkout -B "$BRANCH" origin/main
          curl -fsSL "$CATALOG_MANIFEST_URL" -o library/catalog/manifest.json
          curl -fsSL "$CATALOG_RULES_URL" -o library/catalog/validation-rules.json
          git add library/catalog/manifest.json library/catalog/validation-rules.json
          git commit -m "chore(catalog): sync fixtures from haus-workflow-catalog main"
          if [ -n "$LEASE_REF" ]; then
            git push --force-with-lease="$BRANCH:$LEASE_REF" origin "HEAD:$BRANCH"
          else
            git push -u origin "HEAD:$BRANCH"
          fi
          # gh pr view matches merged/closed PRs too — only skip create when one is OPEN.
          OPEN_PR="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')"
          if [ -z "$OPEN_PR" ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore(catalog): sync fixtures from haus-workflow-catalog main" \
              --body "Automated sync of \`library/catalog/manifest.json\` and \`library/catalog/validation-rules.json\` from the latest \`main\` of [haus-workflow-catalog](https://github.com/WeAreHausTech/haus-workflow-catalog)."
          else
            echo "Updated open PR #${OPEN_PR} on ${BRANCH}"
          fi
