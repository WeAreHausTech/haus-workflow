name: Sync catalog fixture

on:
  repository_dispatch:
    types: [sync-catalog-fixture] # fired by haus-workflow-catalog when manifest.json changes on main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch latest catalog manifest
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/WeAreHausTech/haus-workflow-catalog/main/manifest.json \
            -o library/catalog/manifest.json

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet library/catalog/manifest.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated fixture and open PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/sync-catalog-fixture-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add library/catalog/manifest.json
          git commit -m "chore(catalog): sync fixture from haus-workflow-catalog main"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(catalog): sync fixture from haus-workflow-catalog main" \
            --body "Automated sync of \`library/catalog/manifest.json\` from the latest \`main\` of [haus-workflow-catalog](https://github.com/WeAreHausTech/haus-workflow-catalog)."
