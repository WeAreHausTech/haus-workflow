name: Sync catalog fixture

on:
  repository_dispatch:
    types: [sync-catalog-fixture] # fired by haus-workflow-catalog when manifest.json changes on main
  workflow_dispatch:

concurrency:
  group: sync-catalog-fixture
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch latest catalog fixtures
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/WeAreHausTech/haus-workflow-catalog/main/manifest.json \
            -o library/catalog/manifest.json
          curl -fsSL \
            https://raw.githubusercontent.com/WeAreHausTech/haus-workflow-catalog/main/validation-rules.json \
            -o library/catalog/validation-rules.json

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet library/catalog/manifest.json library/catalog/validation-rules.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Open or update sync PR
        if: steps.diff.outputs.changed == 'true'
        env:
          DISPATCH_PAT: ${{ secrets.HAUS_WORKFLOW_DISPATCH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s\n' "$DISPATCH_PAT" | gh auth login --with-token
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/sync-catalog-fixture"
          git checkout -B "$BRANCH"
          git add library/catalog/manifest.json library/catalog/validation-rules.json
          git commit -m "chore(catalog): sync fixtures from haus-workflow-catalog main"
          git push --force-with-lease origin "$BRANCH"
          if ! gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore(catalog): sync fixtures from haus-workflow-catalog main" \
              --body "Automated sync of \`library/catalog/manifest.json\` and \`library/catalog/validation-rules.json\` from the latest \`main\` of [haus-workflow-catalog](https://github.com/WeAreHausTech/haus-workflow-catalog)."
          fi
