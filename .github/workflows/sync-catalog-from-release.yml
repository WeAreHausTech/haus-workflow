name: Sync catalog from release

# Pull-based fixture sync — no catalog-repo PAT required.
# Resolves latest vX.Y.Z tag from haus-workflow-catalog and opens/updates a sync PR.

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      catalog_ref:
        description: 'Catalog git ref to sync (default: latest vX.Y.Z tag)'
        required: false
        default: ''

concurrency:
  group: sync-catalog-from-release
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Resolve catalog ref
        id: ref
        env:
          INPUT_REF: ${{ github.event.inputs.catalog_ref || '' }}
        run: |
          set -euo pipefail
          REF="$INPUT_REF"
          if [ -z "$REF" ]; then
            REF="$(node <<'NODE'
          const semverRe = /^v?(\d+)\.(\d+)\.(\d+)$/;
          async function main() {
            const res = await fetch(
              'https://api.github.com/repos/WeAreHausTech/haus-workflow-catalog/tags',
              { headers: { 'user-agent': 'haus-sync-catalog-from-release' } },
            );
            if (!res.ok) {
              console.error('tag fetch failed:', res.status);
              process.exit(1);
            }
            const tags = await res.json();
            const valid = (Array.isArray(tags) ? tags : [])
              .map((t) => (typeof t?.name === 'string' ? t.name : ''))
              .filter((name) => semverRe.test(name))
              .sort((a, b) => {
                const pa = semverRe.exec(a).slice(1).map(Number);
                const pb = semverRe.exec(b).slice(1).map(Number);
                for (let i = 0; i < 3; i++) {
                  if (pa[i] !== pb[i]) return pb[i] - pa[i];
                }
                return 0;
              });
            if (valid.length === 0) {
              console.error('no vX.Y.Z tags found');
              process.exit(1);
            }
            process.stdout.write(valid[0]);
          }
          main().catch((err) => {
            console.error(err);
            process.exit(1);
          });
          NODE
          )"
          fi
          echo "catalog_ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "Using catalog ref: ${REF}"

      - name: Fetch latest catalog fixtures
        run: |
          set -euo pipefail
          REF="${{ steps.ref.outputs.catalog_ref }}"
          curl -fsSL \
            "https://raw.githubusercontent.com/WeAreHausTech/haus-workflow-catalog/${REF}/manifest.json" \
            -o library/catalog/manifest.json
          curl -fsSL \
            "https://raw.githubusercontent.com/WeAreHausTech/haus-workflow-catalog/${REF}/validation-rules.json" \
            -o library/catalog/validation-rules.json

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet library/catalog/manifest.json library/catalog/validation-rules.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Open or update sync PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          BRANCH="chore/sync-catalog-fixture"
          CATALOG_REF="${{ steps.ref.outputs.catalog_ref }}"
          CATALOG_MANIFEST_URL="https://raw.githubusercontent.com/WeAreHausTech/haus-workflow-catalog/${CATALOG_REF}/manifest.json"
          CATALOG_RULES_URL="https://raw.githubusercontent.com/WeAreHausTech/haus-workflow-catalog/${CATALOG_REF}/validation-rules.json"
          git fetch origin main
          git fetch origin "$BRANCH" || true
          LEASE_REF=""
          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            LEASE_REF="$(git rev-parse "origin/$BRANCH")"
          fi
          git checkout -B "$BRANCH" origin/main
          curl -fsSL "$CATALOG_MANIFEST_URL" -o library/catalog/manifest.json
          curl -fsSL "$CATALOG_RULES_URL" -o library/catalog/validation-rules.json
          git add library/catalog/manifest.json library/catalog/validation-rules.json
          git commit -m "chore(catalog): sync fixtures from haus-workflow-catalog ${CATALOG_REF}" || echo "No commit needed"
          if [ -n "$LEASE_REF" ]; then
            git push --force-with-lease="$BRANCH:$LEASE_REF" origin "HEAD:$BRANCH"
          else
            git push -u origin "HEAD:$BRANCH"
          fi
          OPEN_PR="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')"
          if [ -z "$OPEN_PR" ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore(catalog): sync fixtures from haus-workflow-catalog ${CATALOG_REF}" \
              --body "Pull-based sync of \`library/catalog/manifest.json\` and \`library/catalog/validation-rules.json\` from ref \`${CATALOG_REF}\` of [haus-workflow-catalog](https://github.com/WeAreHausTech/haus-workflow-catalog).

          Triggered by \`sync-catalog-from-release\` workflow (cron or manual)."
          else
            echo "Updated open PR #${OPEN_PR} on ${BRANCH}"
          fi
